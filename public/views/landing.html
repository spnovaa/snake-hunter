<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Hunter — Settings</title>
  <link rel="stylesheet" href="../../src/styles/app.css" />
</head>
<body>

  <header class="site-header">Snake Hunter</header>

  <main class="flex-col-center" style="height: calc(100vh - 120px);">
    <div id="landing-menu" class="landing-menu card-frame">

      <h1 class="landing-menu__title text-center">Settings</h1>

      <fieldset class="landing-menu__level-group" style="border: none; padding: 0;">
        <legend><h2 style="margin: 0 0 8px;">Level</h2></legend>

        <label for="radio-level-easy">Easy</label>
        <input
          id="radio-level-easy"
          type="radio"
          name="radio-level"
          value="1"
          checked
          style="margin-right: 16px;"
        />

        <label for="radio-level-hard">Hard</label>
        <input
          id="radio-level-hard"
          type="radio"
          name="radio-level"
          value="2"
        />
      </fieldset>

      <div class="landing-menu__score-row">
        <label for="landing-score">High Score:</label>
        <span id="landing-score">0</span>
      </div>

      <button id="landing-start-button" class="btn-start">Start!</button>

    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer__item">
      Powered by
      <a href="mailto:spnova@aut.ac.ir">SpNova</a>
    </div>
    <div class="site-footer__item">
      <a href="https://github.com/spnovaa/snake-hunter" aria-label="GitHub repository">
        <img class="icon-xs" src="../assets/git/github.png" alt="GitHub" />
      </a>
    </div>
  </footer>

  <script type="module" src="../../src/js/app.js"></script>
</body>
</html>

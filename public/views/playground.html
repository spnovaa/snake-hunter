<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Hunter — Play</title>
  <link rel="stylesheet" href="../../src/styles/app.css" />
</head>
<body>

  <div class="game-hud" id="game-hud" role="status" aria-live="polite">
    <div class="game-hud__section">
      <span class="game-hud__label">Level:&nbsp;</span>
      <span class="game-hud__value" id="hud-level">—</span>
    </div>

    <div class="game-hud__section">
      <span class="game-hud__label">Time:&nbsp;</span>
      <span class="game-hud__value" id="timer">60</span>
    </div>

    <div class="game-hud__section game-hud__section--center">
      <button class="btn-pause" id="pause-btn" aria-label="Pause game">&#9616;&#9616;</button>
    </div>

    <div class="game-hud__section">
      <span class="game-hud__label">Score:&nbsp;</span>
      <span class="game-hud__value" id="gameplay-score">0</span>
    </div>
  </div>

  <div class="canvas-container" id="canvas-container">
    <canvas id="playground"></canvas>
  </div>

  <script type="module" src="../../src/js/main.js"></script>
</body>
</html>
